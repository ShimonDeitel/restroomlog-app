name: Restroomlog
options:
  bundleIdPrefix: com.shimondeitel.nighttimelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Restroomlog:
    type: application
    platform: iOS
    sources:
      - path: Restroomlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nighttimelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Restroomlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RestroomlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RestroomlogTests
      - path: Restroomlog.storekit
    dependencies:
      - target: Restroomlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nighttimelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RestroomlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RestroomlogUITests
    dependencies:
      - target: Restroomlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nighttimelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Restroomlog:
    build:
      targets:
        Restroomlog: all
        RestroomlogTests: [test]
        RestroomlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Restroomlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Restroomlog.storekit
      targets:
        - RestroomlogTests
        - RestroomlogUITests
    archive:
      config: Release
